<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RPP Private | Black Edition</title>
    
    <!-- Configurações de PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.imgur.com/1QjRMOz.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #000000; 
            --accent: #D4AF37; 
            --success: #10b981;
            --danger: #ff4d4d;
            --bg-app: #0A0A0A;
            --bg-card: #141414;
            --bg-input: #1C1C1E;
            --bg-nav: #000000;
            --text-dark: #FFFFFF;
            --text-muted: #8E8E93;
            --border: #2C2C2E;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius-md: 12px;
        }

        /* --- ESTILO DA SPLASH SCREEN ANIMADA --- */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-out;
        }

        .logo-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
        }

        /* Máscara preta que sobe para revelar o gráfico */
        .reveal-overlay {
            position: absolute;
            top: 25%; /* Ajustado para a posição do gráfico na sua imagem */
            left: 30%;
            width: 40%;
            height: 35%;
            background: #000; 
            z-index: 2;
            animation: revealUp 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes revealUp {
            from { transform: translateY(0); }
            to { transform: translateY(-100%); }
        }

        .loading-bar {
            width: 180px;
            height: 2px;
            background: #1a1a1a;
            margin-top: -20px;
            border-radius: 10px;
            overflow: hidden;
            z-index: 3;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #AA8928, #D4AF37);
            animation: loadProgress 2.8s ease-in-out forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* --- ESTILOS DO APP --- */
        [data-theme="light"] {
            --bg-app: #F2F2F7; --bg-card: #FFFFFF; --bg-input: #E5E5EA; --bg-nav: #FFFFFF;
            --text-dark: #1C1C1E; --text-muted: #636366; --border: #D1D1D6;
            --shadow-card: 0 4px 16px rgba(0, 0, 0, 0.08); --primary: #1C1C1E;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-dark); padding-bottom: 110px; transition: all 0.4s ease; min-height: 100vh; overflow-x: hidden; }

        #app-lock { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .hidden-value { position: relative; color: transparent !important; transition: all 0.4s ease; user-select: none; filter: blur(15px); opacity: 0.2; }
        body.is-visible .hidden-value { color: inherit !important; filter: blur(0); opacity: 1; }

        .app-header { background: var(--primary); padding: 40px 20px 30px 20px; position: sticky; top: 0; z-index: 1000; color: white; border-bottom: 1px solid var(--border); }
        .app-header h1 { font-size: 0.9rem; font-weight: 800; color: #FFF; letter-spacing: 2px; text-transform: uppercase; }
        .app-header span { color: var(--accent); font-weight: 600; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px; margin-top: -25px; }
        .stat-card { background: var(--bg-card); padding: 18px; border-radius: var(--radius-md); border: 1px solid var(--border); box-shadow: var(--shadow-card); }
        .stat-card span { font-size: 0.6rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-card div { font-size: 1.1rem; font-weight: 700; margin-top: 6px; }

        .container { padding: 0 20px; }
        .section-title { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin: 30px 0 15px 0; display: flex; align-items: center; gap: 10px; letter-spacing: 1.5px; }

        .btn { padding: 16px; border-radius: var(--radius-md); border: none; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
        .btn-primary { background: linear-gradient(135deg, #D4AF37 0%, #AA8928 100%); color: #000; text-transform: uppercase; letter-spacing: 1px; }
        .btn-category { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dark); margin-bottom: 12px; justify-content: flex-start; padding-left: 20px; }
        .icon-box { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: var(--bg-input); color: var(--accent); margin-right: 15px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 90px; background: var(--bg-nav); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 2000; padding-bottom: 20px; }
        .nav-item { color: #8E8E93; font-size: 0.6rem; font-weight: 700; flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-item.active { color: var(--accent); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 3000; display:none; align-items: flex-end; }
        .modal-sheet { background: var(--bg-card); width: 100%; border-radius: 24px 24px 0 0; padding: 20px 25px 40px 25px; max-height: 92vh; overflow-y: auto; border-top: 2px solid var(--accent); }
        
        input, select { width: 100%; padding: 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text-dark); font-size: 1rem; margin-bottom: 15px; outline: none; }
        .main-card { background: var(--bg-card); border-radius: var(--radius-md); padding: 22px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; overflow: hidden; }
        .main-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); }
        #toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); padding: 14px 28px; border-radius: 12px; color: #000; font-weight: 800; font-size: 0.75rem; z-index: 5000; display: none; text-transform: uppercase; text-align: center; }
    </style>
</head>
<body>

<!-- SPLASH SCREEN ANIMADA -->
<div id="splash-screen">
    <div class="logo-container">
        <!-- SUA IMAGEM DO IMGUR -->
        <img src="https://i.imgur.com/1QjRMOz.png" alt="RPP Logo" class="logo-img">
        <!-- Camada que faz o gráfico subir -->
        <div class="reveal-overlay"></div>
    </div>
    <div class="loading-bar">
        <div class="loading-progress"></div>
    </div>
    <p style="color: var(--accent); font-size: 0.6rem; letter-spacing: 4px; margin-top: 20px; font-weight: 700; opacity: 0.8;">PRIVATE BANKING SYSTEM</p>
</div>

<!-- TELA DE BLOQUEIO -->
<div id="app-lock" style="display: none;">
    <i data-lucide="shield-check" style="width: 40px; height: 40px; color: var(--accent); margin-bottom: 20px;"></i>
    <p style="font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 20px;">AUTENTICAÇÃO NECESSÁRIA</p>
    <button class="btn btn-primary" style="width: auto; padding: 12px 30px;" onclick="unlockApp()">ACESSAR SISTEMA</button>
</div>

<div id="toast"></div>

<header class="app-header">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div><h1>RPP <span>PRIVATE</span></h1><span style="font-size: 0.55rem; color: #8E8E93; text-transform: uppercase; letter-spacing: 1.5px;">Black Edition Patrimonial</span></div>
        <button onclick="togglePrivacy()" class="btn" style="width:42px; height:42px; padding:0; background: rgba(255,255,255,0.05); border-radius: 50%;"><i data-lucide="eye-off" style="width:18px; color: #fff;"></i></button>
    </div>
    <div style="display: flex; gap: 10px; margin-top: 25px;">
        <select id="month-selector" onchange="render()"></select>
        <select id="year-selector" onchange="render()"></select>
    </div>
</header>

<section id="inicio" class="content-section active">
    <div class="dashboard-grid">
        <div class="stat-card"><span>Liquidez (In)</span><div id="stat-inc" class="hidden-value">R$ 0</div></div>
        <div class="stat-card"><span>Fluxo (Out)</span><div id="stat-exp" class="hidden-value">R$ 0</div></div>
        <div class="stat-card"><span>Pendências</span><div id="stat-pen" class="hidden-value" style="color:var(--danger)">R$ 0</div></div>
        <div class="stat-card"><span>Consolidado</span><div id="stat-bal" class="hidden-value" style="color:var(--accent)">R$ 0</div></div>
    </div>
    <div class="container">
        <div class="section-title"><i data-lucide="shield" style="width: 14px; color: var(--accent);"></i> Titulares do Mês</div>
        <div id="resumo-casa-container"></div>
        <div id="tabelas-por-pessoa" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;"></div>
    </div>
</section>

<section id="adicionar" class="content-section">
    <div class="container" style="padding-top: 20px;">
        <div class="section-title"><i data-lucide="plus-square" style="width: 14px;"></i> Gestão de Lançamentos</div>
        <button class="btn btn-category" onclick="openModal('modal-fixo')"><div class="icon-box"><i data-lucide="refresh-cw"></i></div> Despesa Recorrente</button>
        <button class="btn btn-category" onclick="openModal('modal-parcela')"><div class="icon-box"><i data-lucide="layers"></i></div> Estruturar Parcelas</button>
        <button class="btn btn-category" onclick="openModal('modal-variavel')"><div class="icon-box"><i data-lucide="zap"></i></div> Débito Eventual</button>
        <button class="btn btn-category" onclick="openModal('modal-ganho')"><div class="icon-box"><i data-lucide="trending-up"></i></div> Aporte / Receita</button>
    </div>
</section>

<!-- (Modais de lançamento permanecem iguais aos anteriores) -->
<div id="modal-fixo" class="modal-overlay" onclick="closeModals(event)"><div class="modal-sheet">
    <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:20px"><h2>Recorrentes</h2><button onclick="closeModals('force')" style="background:none; border:none; color:#fff"><i data-lucide="x"></i></button></div>
    <input type="number" id="f-dia" placeholder="Dia Vencimento"><input type="text" id="f-desc" placeholder="Ex: Aluguel"><input type="text" id="f-resp" placeholder="Responsável" value="Casa"><button class="btn btn-primary" onclick="addFixedAccount()">CONFIRMAR</button>
    <table class="history-table" id="fixed-body" style="width:100%; margin-top:20px; color:#fff"></table>
</div></div>

<!-- (Omitido o restante dos modais por brevidade, mas devem ser mantidos conforme o código original) -->

<nav class="bottom-nav">
    <div class="nav-item active" onclick="openTab('inicio')"><i data-lucide="pie-chart"></i><span>Resumo</span></div>
    <div class="nav-item" onclick="openTab('adicionar')"><i data-lucide="plus-circle"></i><span>Lançar</span></div>
    <div class="nav-item" onclick="openTab('configuracao')"><i data-lucide="settings"></i><span>Privê</span></div>
</nav>

<script>
    // Registro do Service Worker (PWA)
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    // Controle da Splash Screen
    window.addEventListener('load', () => {
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => { splash.style.display = 'none'; }, 800);
        }, 3000); // Tempo para ver a animação do gráfico
    });

    // Lógica do App (Sua base original)
    const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"], anos = [2024, 2025, 2026, 2027], STORAGE_KEY = 'FIN_PRO_BLACK_V2';
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { fixed_accounts: [], meses_dados: {}, parcelamentos: [], security_active: false }, cachedPersonData = {}, dbHistory = [], currentPessoaModal = "";

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); render(); lucide.createIcons(); }

    function unlockApp() { document.getElementById('app-lock').style.display = 'none'; }

    window.addEventListener('DOMContentLoaded', () => {
        if (db.security_active) document.getElementById('app-lock').style.display = 'flex';
        lucide.createIcons();
    });

    // ... (Mantenha todas as suas funções: render, addFixedAccount, addParcelamento, abrirDetalhes, etc.) ...
    // Importante: lembre-se de manter as funções que você já tinha no código original para o app funcionar.

    const mSel = document.getElementById('month-selector'), ySel = document.getElementById('year-selector');
    meses.forEach((m, i) => { mSel.innerHTML += `<option value="${i}" ${i === new Date().getMonth() ? 'selected' : ''}>${m}</option>`; });
    anos.forEach(y => { ySel.innerHTML += `<option value="${y}" ${y === new Date().getFullYear() ? 'selected' : ''}>${y}</option>`; });

    function openTab(t) { 
        document.querySelectorAll('.content-section, .nav-item').forEach(x => x.classList.remove('active')); 
        document.getElementById(t).classList.add('active'); 
    }

    function togglePrivacy() { document.body.classList.toggle('is-visible'); }

    // Inicia o app
    render();
</script>
</body>
</html>
